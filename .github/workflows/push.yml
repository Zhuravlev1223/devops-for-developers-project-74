name: Push Docker image

on:
  push:
    branches: [ main ]

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Run docker-compose tests
      run: cd code && make ci

    - name: Build and push
      run: |
        docker build -f Dockerfile.production -t ${{ secrets.DOCKER_USERNAME }}/devops-for-developers-project-74:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/devops-for-developers-project-74:latest
